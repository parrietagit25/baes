<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba subida simple (sin JS)</title>
</head>
<body>
    <h1>Prueba de subida de archivo (sin JavaScript)</h1>
    <p>Selecciona cualquier archivo y envíalo. Este formulario usa solo HTML estándar (method="POST" y enctype="multipart/form-data").</p>

    <form action="/api/test_form_upload.php" method="POST" enctype="multipart/form-data">
        <div>
            <label for="archivo">Archivo:</label>
            <input type="file" name="archivo" id="archivo" required>
        </div>
        <div style="margin-top: 1rem;">
            <button type="submit">Subir archivo</button>
        </div>
    </form>
</body>
</html>
