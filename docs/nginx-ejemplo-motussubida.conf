# Ejemplo de configuración Nginx para Motus (subida de adjuntos sin 403)
# Uso: copiar a /etc/nginx/sites-available/ y enlazar en sites-enabled.
# Cambiar server_name y proxy_pass si usas otro puerto (ej. 8086 para motus_php).

client_max_body_size 20M;

server {
    listen 80;
    server_name motus.automarket.com.pa;
    # Si usas SSL, descomenta y ajusta:
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/motus.automarket.com.pa/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/motus.automarket.com.pa/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8086;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;   # importante para subida de archivos
        client_max_body_size 20M;
    }
}
